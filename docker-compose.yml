services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      APP_BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"

volumes:
  mongo-data:
